<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image tags</title>
    <style>
        .responsive-image {
            max-width:100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <!-- src: source alt: alternate text | Self-closing tag -->
    <img src="1.jpg "alt="Could not find the image"> 
    <img src="images/1.jpg" alt="Could not find the image"> 

    <!-- Common attributes & variations -->
     <!-- Width & height -->
    <!-- <img src="i1.jpg" alt="Could not find the image" width="200px" height="100px">  -->
    <img src="1.jpg" alt="Could not find the image" width="200px" height="100px"> 
    <!-- Tooltip -->
    <img src="1.jpg" alt="Could not find the image" title="Image of a Dog"> 
    <!-- Style -->
